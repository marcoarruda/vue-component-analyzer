name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Read release metadata
        id: metadata
        run: |
          package_name=$(node -p "require('./package.json').name")
          tag_version="${GITHUB_REF_NAME#v}"

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$tag_version" >> "$GITHUB_OUTPUT"
          echo "vsix_path=${package_name}-${tag_version}.vsix" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Apply release version to package.json
        run: npm run set:version
        env:
          RELEASE_VERSION: ${{ steps.metadata.outputs.package_version }}

      - name: Build extension
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --out "${{ steps.metadata.outputs.vsix_path }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: ${{ steps.metadata.outputs.vsix_path }}
          if-no-files-found: error

  publish-vscode-marketplace:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-vsix

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath ./*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-open-vsx:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-vsix

      - name: Publish to Open VSX
        run: npx ovsx publish ./*.vsix -p "${{ secrets.OVSX_PAT }}"

  release:
    runs-on: ubuntu-latest
    needs:
      - package
      - publish-vscode-marketplace
      - publish-open-vsx

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-vsix

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./*.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true